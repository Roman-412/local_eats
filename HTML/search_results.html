<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Eats | Search Results</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../CSS/location-modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .search-results-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary-orange);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="../index.html" style="text-decoration: none;">
            <div class="logo">Local Eats</div>
        </a>

        <div class="location-input">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" placeholder="Enter your location">
            <i class="fas fa-chevron-down"></i>
        </div>

        <div class="search-bar">
            <input type="text" id="main-search-input" placeholder="Search again...">
            <i class="fas fa-search" id="search-icon"></i>
        </div>

        <div class="user-profile-container" id="user-profile-container"
            style="display: flex; align-items: center; gap: 15px;">
            <span id="welcome-message" style="color: white; font-weight: 600;"></span>
        </div>
    </header>

    <div class="search-results-container">
        <div class="search-header">
            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <h2 id="search-title">Search Results</h2>
        </div>

        <div id="menu-container" class="menu-container">
            <!-- Results will be loaded here -->
            <div class="no-results">Searching...</div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/cart-utils.js"></script>
    <script src="../js/food-loader.js"></script>
    <!-- Location Modal -->
    <div id="locationModal" class="location-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Your Location</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="map-container" style="overflow-y: auto;">
                <!-- Modal Location Search -->
                <div class="modal-search"
                    style="width: 90%; max-width: 800px; margin-bottom: 15px; display: flex; gap: 10px;">
                    <input type="text" id="modalLocationSearch" placeholder="Search for area (e.g. Adyar, Chennai)"
                        style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-dark); background: var(--surface-dark); color: white; outline: none;">
                    <button id="searchAreaBtn"
                        style="padding: 10px 20px; background: var(--primary-orange); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold;">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <div id="map">
                    <iframe id="mapFrame" src="https://maps.google.com/maps?q=Chennai&output=embed" width="100%"
                        height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>

                <button class="confirm-location-btn">Confirm Location</button>
            </div>
        </div>
    </div>
    <script src="../js/location-map.js"></script>

</body>

</html>
